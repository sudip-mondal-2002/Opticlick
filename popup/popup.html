<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opticlick Engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: #0f0f12;
      color: #e8e8f0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e1e2a;
    }

    header .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #6c63ff, #48cfad);
      border-radius: 6px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    header .status-dot {
      margin-left: auto;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3a3a4a;
      transition: background 0.3s;
    }
    header .status-dot.running { background: #48cfad; box-shadow: 0 0 6px #48cfad; }
    header .status-dot.error   { background: #ff6b6b; }

    .prompt-section {
      padding: 14px 16px 0;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      max-height: 160px;
      resize: vertical;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 13px;
      padding: 10px 12px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #6c63ff; }
    textarea::placeholder { color: #55556a; }

    .controls {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
    }

    button {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-run {
      background: linear-gradient(135deg, #6c63ff, #5a52e0);
      color: #fff;
    }
    #btn-stop {
      background: #2a2a3a;
      color: #ff6b6b;
    }

    .log-section {
      border-top: 1px solid #1e1e2a;
      padding: 10px 16px 14px;
    }

    .log-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #55556a;
      margin-bottom: 8px;
    }

    #log-output {
      background: #0a0a0f;
      border: 1px solid #1e1e2a;
      border-radius: 8px;
      padding: 8px 10px;
      height: 130px;
      overflow-y: auto;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #8888a8;
    }

    #log-output .entry { margin-bottom: 2px; }
    #log-output .entry.info  { color: #8888a8; }
    #log-output .entry.ok    { color: #48cfad; }
    #log-output .entry.warn  { color: #ffd93d; }
    #log-output .entry.error { color: #ff6b6b; }

    .step-counter {
      text-align: center;
      font-size: 11px;
      color: #44445a;
      padding-bottom: 8px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo"></div>
    <h1>Opticlick Engine</h1>
    <div class="status-dot" id="status-dot"></div>
  </header>

  <div class="prompt-section">
    <textarea
      id="prompt-input"
      placeholder="Describe what you want the agent to do… e.g. 'Click the Sign Up button and fill in the email field with test@example.com'"
    ></textarea>
  </div>

  <div class="controls">
    <button id="btn-run">&#9654; Run Agent</button>
    <button id="btn-stop" disabled>&#9632; Stop</button>
  </div>

  <div class="log-section">
    <div class="log-label">Activity Log</div>
    <div id="log-output"></div>
  </div>

  <div class="step-counter" id="step-counter"></div>

  <script src="popup.js"></script>
</body>
</html>
