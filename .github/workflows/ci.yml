name: CI - Lint, Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop]

jobs:
  ci:
    name: Lint → Build → Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Lint ─────────────────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── Build (required before any tests) ────────────────────────────────────
      - name: Build
        run: npm run build

      # ── Install Playwright browser (needed before any tests run) ─────────────
      # --with-deps installs the OS libraries (libnss3, libglib2.0-0, etc.)
      # that Playwright's Chromium needs on Ubuntu.
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # ── All tests with coverage (unit + integration + dom + e2e) ─────────────
      # Chrome extensions cannot run in --headless mode — Xvfb provides a
      # virtual display for the E2E tests. xvfb-run --auto-servernum picks a
      # free display number so parallel runners never collide.
      - name: Test all projects with coverage
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: xvfb-run --auto-servernum -- npm run test:coverage

      - name: Report coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          file-coverage-mode: changes

      - name: Package extension
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm run zip

      - name: Save release artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: .output/*.zip
          retention-days: 1

  release:
    name: Release to Chrome Web Store
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download release zip
        uses: actions/download-artifact@v4
        with:
          name: release-zip

      - name: Upload to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: 'upload'
          client_id: ${{ secrets.CLIENT_ID }}
          client_secret: ${{ secrets.CLIENT_SECRET }}
          refresh_token: ${{ secrets.REFRESH_TOKEN }}
          extension_id: plcgabnobclbdbiemnmkkjcgbfefepkc
          zip_file: '*.zip'
